    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --radius: 14px; --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#1a1a18; --surface:#252523; --border:rgba(255,255,255,0.1); --text:#f0efe8; --muted:#9b9b97; --hint:#6b6b68; }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem 4rem; }
    .container { max-width:980px; margin:0 auto; }
    header { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:1.75rem; }
    header h1 { font-size:22px; font-weight:600; }
    header p  { font-size:13px; color:var(--muted); margin-top:4px; }
    .btn { font-size:13px; padding:8px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; display:flex; align-items:center; gap:6px; transition:opacity .15s; }
    .btn:hover { opacity:.7; } .btn:disabled { opacity:.4; cursor:not-allowed; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(190px, 1fr)); gap:14px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; transition:transform .15s, box-shadow .15s; cursor:pointer; position:relative; }
    .card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.08); }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .region { font-size:15px; font-weight:600; }
    .city   { font-size:12px; color:var(--muted); margin-top:2px; }
    .weather-icon { font-size:26px; }
    .divider { height:1px; background:var(--border); margin:12px 0; }
    .temp-now-label { font-size:11px; color:var(--hint); margin-bottom:3px; }
    .temp-now  { font-size:36px; font-weight:700; line-height:1; }
    .temp-actual { font-size:12px; color:var(--muted); margin-top:4px; }
    .temp-range { display:flex; gap:12px; margin-top:12px; }
    .range-item { flex:1; }
    .range-label { font-size:10px; color:var(--hint); margin-bottom:2px; }
    .range-val   { font-size:17px; font-weight:600; }
    .meta { display:flex; gap:10px; margin-top:12px; font-size:12px; color:var(--muted); }
    .badge { display:inline-block; font-size:11px; font-weight:500; padding:3px 10px; border-radius:20px; margin-top:12px; }
    .site-count { font-size:11px; color:var(--hint); margin-top:8px; }
    .alert-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; margin-top:8px; }
    .alert-watch  { background:#FFF3CD; color:#856404; border:1px solid #FFEAA7; }
    .alert-warn   { background:#FFEAEA; color:#A32D2D; border:1px solid #FFB3B3; }
    .alert-none   { display:none; }
    .alert-loading { background:var(--border); color:var(--hint); border:none; }
    .skeleton { background:var(--border); border-radius:var(--radius); height:230px; animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .error-box { grid-column:1/-1; padding:3rem; text-align:center; color:var(--muted); font-size:15px; }
    footer { margin-top:2.5rem; text-align:center; font-size:12px; color:var(--hint); line-height:1.8; }
    footer a { color:var(--muted); }
    #api-banner { background:#FAEEDA; border:1px solid #EF9F27; border-radius:var(--radius-sm); padding:12px 16px; margin-bottom:1.5rem; font-size:13px; color:#633806; display:flex; align-items:center; gap:10px; flex-wrap:wrap; display: none !important; }
    #api-banner input { flex:1; min-width:200px; font-size:13px; padding:6px 10px; border-radius:6px; border:1px solid #EF9F27; background:#fff; color:#1a1a18; }
    #api-banner button { white-space:nowrap; font-size:13px; padding:6px 14px; border-radius:6px; border:1px solid #BA7517; background:#BA7517; color:#fff; cursor:pointer; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100; display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; pointer-events:none; transition:opacity .2s; }
    .modal-overlay.open { opacity:1; pointer-events:auto; }
    .modal { background:var(--surface); border-radius:var(--radius); width:100%; max-width:560px; max-height:85vh; display:flex; flex-direction:column; transform:translateY(16px); transition:transform .2s; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-header { padding:1.25rem 1.5rem 1rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .modal-header h2 { font-size:17px; font-weight:600; }
    .modal-close { background:none; border:none; font-size:20px; color:var(--muted); cursor:pointer; line-height:1; padding:4px; }
    .modal-close:hover { color:var(--text); }
    .modal-body { overflow-y:auto; flex:1; }
    .site-list { list-style:none; }
    .site-item { padding:14px 1.5rem; border-bottom:1px solid var(--border); cursor:pointer; transition:background .12s; }
    .site-item:last-child { border-bottom:none; }
    .site-item:hover { background:rgba(0,0,0,0.03); }
    @media (prefers-color-scheme:dark) { .site-item:hover { background:rgba(255,255,255,0.05); } }
    .site-name { font-size:14px; font-weight:500; }
    .site-addr { font-size:12px; color:var(--muted); margin-top:3px; }
    .site-weather { padding:1.5rem; display:none; flex-direction:column; gap:12px; }
    .site-weather.visible { display:flex; }
    .back-btn { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); background:none; border:none; cursor:pointer; padding:0; margin-bottom:4px; }
    .back-btn:hover { color:var(--text); }
    .sw-name { font-size:18px; font-weight:700; }
    .sw-addr { font-size:12px; color:var(--muted); margin-top:2px; }
    .sw-big  { font-size:52px; font-weight:800; line-height:1; margin-top:12px; }
    .sw-sub  { font-size:13px; color:var(--muted); margin-top:6px; }
    .sw-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
    .sw-cell { background:var(--bg); border-radius:10px; padding:12px 14px; }
    .sw-cell-label { font-size:11px; color:var(--hint); margin-bottom:4px; }
    .sw-cell-val   { font-size:22px; font-weight:700; }
    .sw-loading { text-align:center; padding:2rem; color:var(--muted); font-size:14px; }
    .sw-error   { text-align:center; padding:2rem; color:#A32D2D; font-size:14px; }
  </style>
</head>

function getApiBase() { return localStorage.getItem('vercel_api_url') || 'https://daewooenc-weather.vercel.app'; }
function saveApiUrl() {
  const val = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
  if (val) { localStorage.setItem('vercel_api_url', val); setBannerGreen(); loadAll(); }
}
function setBannerGreen() {
  const b = document.getElementById('api-banner');
  b.style.background='#EAF3DE'; b.style.borderColor='#639922'; b.style.color='#27500A';
}
window.addEventListener('load', () => {
  const saved = getApiBase();
  if (saved) { document.getElementById('api-url-input').value = saved; setBannerGreen(); }
});

function ptyIcon(pty) { return {'0':'☀️','1':'🌧️','2':'🌨️','3':'❄️','4':'🌦️','5':'🌧️','6':'🌨️','7':'❄️'}[pty]??'🌡️'; }
function ptyDesc(pty) { return {'0':'맑음','1':'비','2':'비/눈','3':'눈','4':'소나기','5':'빗방울','6':'빗방울+눈','7':'눈날림'}[pty]??'-'; }
function tempMeta(t) {
if (t >= 38) return { label: '옥외작업 중지', color: '#8B0000', bg: '#FDE8E8' };
if (t >= 35) return { label: '옥외작업 최소화', color: '#D94111', bg: '#FFF0EA' };
if (t >= 33) return { label: '시간당 15분 이상 휴식', color: '#C67A00', bg: '#FFF7E6' };
if (t >= 31) return { label: '시간당 15분 휴식', color: '#2B7318', bg: '#EAF5E6' };

if (t >= 28) return { label: '더움', color: '#3B6D11', bg: '#EAF3DE' };
if (t >= 25) return { label: '산뜻함', color: '#185FA5', bg: '#E6F1FB' };
if (t >= 20)  return { label: '선선함', color: '#534AB7', bg: '#EEEDFE' };
return { label: '매우 추움', color: '#0C447C', bg: '#B5D4F4' };
}
function tempColor(t) {
  if (t>=35) return '#A32D2D'; if (t>=28) return '#BA7517';
  if (t>=20) return '#3B6D11'; if (t>=10) return '#185FA5';
  if (t>=0)  return '#534AB7'; return '#0C447C';
}

async function fetchWeather(nx, ny) {
  const base = getApiBase();
  const [cur, fcst] = await Promise.all([
    fetch(`${base}/api/weather?nx=${nx}&ny=${ny}&type=current`).then(r=>r.json()),
    fetch(`${base}/api/weather?nx=${nx}&ny=${ny}&type=forecast`).then(r=>r.json()),
  ]);
  return { cur, fcst };
}

async function fetchAlert(regionName) {
  try {
    const base = getApiBase();
    const res = await fetch(`${base}/api/alert?region=${encodeURIComponent(regionName)}`);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

function renderAlertBadge(alertData, regionName) {
  if (!alertData || alertData.type==='none' || !alertData.type)
    return `<span class="alert-badge alert-none" id="alert-${regionName}"></span>`;
  if (alertData.type==='warning')
    return `<span class="alert-badge alert-warn" id="alert-${regionName}">🔴 폭염경보 발효중</span>`;
  if (alertData.type==='watch')
    return `<span class="alert-badge alert-watch" id="alert-${regionName}">🟡 폭염주의보 발효중</span>`;
  return `<span class="alert-badge alert-none" id="alert-${regionName}"></span>`;
}
function renderCard(r, data) {
  const siteCount = (SITES[r.name]||[]).length;
  if (!data) return `
    <div class="card" onclick="openModal('${r.name}')" style="min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;opacity:.5;">
      <div class="region">${r.name}</div>
      <span style="font-size:13px;color:var(--muted)">API URL을 먼저 설정해주세요</span>
      <div class="site-count">현장 ${siteCount}개</div>
    </div>`;
  const {cur,fcst} = data;
  const feels = cur.feelsLike??cur.temp;
  const meta = tempMeta(feels);
  return `
    <div class="card" onclick="openModal('${r.name}')">

      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="region">${r.name}</div>
          <div class="city">${r.city} 기준</div>
          <div class="temp-now-label" style="margin-top:4px;">현재 체감온도</div>
          <div class="temp-now" style="color:${meta.color}">${feels}°C</div>
          <div class="temp-actual">실제 기온 ${cur.temp}°C · ${ptyDesc(cur.pty)}</div>
        </div>
        <div style="text-align:right;">
          <div>
            <div class="range-label">오늘 최고 체감</div>
            <div class="range-val" style="color:${tempColor(fcst.feelsMax??0)}">${fcst.feelsMax??'-'}°</div>
          </div>
          <div style="margin-top:4px;">
            <div class="range-label">오늘 최저 체감</div>
            <div class="range-val" style="color:${tempColor(fcst.feelsMin??0)}">${fcst.feelsMin??'-'}°</div>
          </div>
        </div>
      </div>

      <div class="divider"></div>
      <div class="meta"><span>💧 ${cur.humidity}%</span><span>💨 ${cur.wind}m/s</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <div>
          <span class="badge" style="margin-top:0;color:${meta.color};background:${meta.bg}">${meta.label}</span>
          <span class="alert-badge alert-loading" id="alert-${r.name}" style="display:block;margin-top:6px;">특보 확인중…</span>
        </div>
        <div style="font-size:22px;line-height:1;">${ptyIcon(cur.pty)}</div>
      </div>
      <div class="site-count">현장 ${siteCount}개 ›</div>
    </div>`;
}
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  document.getElementById('grid').innerHTML = REGIONS.map(()=>`<div class="skeleton"></div>`).join('');
  document.getElementById('updated').textContent = '불러오는 중...';
  try {
    const results = await Promise.all(REGIONS.map(r => fetchWeather(r.nx, r.ny).catch(()=>null)));
    document.getElementById('grid').innerHTML = REGIONS.map((r,i)=>renderCard(r,results[i])).join('');
    const now = new Date();
    document.getElementById('updated').textContent =
      `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 기준`;
    REGIONS.forEach(async r => {
      const alertData = await fetchAlert(r.name).catch(()=>null);
      const el = document.getElementById(`alert-${r.name}`);
      if (el) { const tmp=document.createElement('div'); tmp.innerHTML=renderAlertBadge(alertData,r.name); el.replaceWith(tmp.firstElementChild); }
      updateMapAlert(r.name, alertData?.type || 'none');  // ← 이 한 줄 추가
    });
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="error-box">⚠️ 데이터를 불러오지 못했습니다.<br>${e.message}</div>`;
  } finally { btn.disabled=false; }
}

// ── 모달 ─────────────────────────────────────────────────────────────
function openModal(regionName) {
  const sites = SITES[regionName]||[];
  document.getElementById('modal-title').textContent = `${regionName} 권역 · 현장 ${sites.length}개`;
  document.getElementById('modal-body').innerHTML = sites.length
    ? `<ul class="site-list">${sites.map((s,i)=>`
        <li class="site-item" onclick="showSiteWeather('${regionName}',${i})">
          <div class="site-name">${s.name}</div>
          <div class="site-addr">${s.addr}</div>
        </li>`).join('')}</ul>`
    : `<div style="padding:3rem;text-align:center;color:var(--muted);">현장 정보가 없습니다.</div>`;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target===document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow=''; }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModalDirect(); });

// ── 현장별 날씨 (개별 격자 좌표 사용) ───────────────────────────────
async function showSiteWeather(regionName, siteIndex) {
  const site = SITES[regionName][siteIndex];

  // 현장 개별 좌표 → 없으면 권역 대표 좌표 폴백
  const regionDef = REGIONS.find(r=>r.name===regionName);
  const coords = SITE_COORDS[site.name] || { nx: regionDef.nx, ny: regionDef.ny };
  const isIndividual = !!SITE_COORDS[site.name];

  document.getElementById('modal-title').textContent = site.name;
  document.getElementById('modal-body').innerHTML = `
    <div class="site-weather visible">
      <button class="back-btn" onclick="openModal('${regionName}')">← ${regionName} 권역 목록</button>
      <div><div class="sw-name">${site.name}</div><div class="sw-addr">${site.addr}</div></div>
      <div class="sw-loading">날씨 정보를 불러오는 중...</div>
    </div>`;

  try {
    const { cur, fcst } = await fetchWeather(coords.nx, coords.ny);
    const feels = cur.feelsLike??cur.temp;
    const meta = tempMeta(feels);

    document.getElementById('modal-body').innerHTML = `
      <div class="site-weather visible">
        <button class="back-btn" onclick="openModal('${regionName}')">← ${regionName} 권역 목록</button>
        <div><div class="sw-name">${site.name}</div><div class="sw-addr">${site.addr}</div></div>
        <div class="sw-big" style="color:${meta.color}">${feels}°C</div>
        <div class="sw-sub">
          현재 체감온도 · 실제 기온 ${cur.temp}°C · ${ptyDesc(cur.pty)} ${ptyIcon(cur.pty)}<br>
          <span class="badge" style="display:inline-block;margin-top:8px;color:${meta.color};background:${meta.bg}">${meta.label}</span>
        </div>
        <div class="sw-grid">
          <div class="sw-cell"><div class="sw-cell-label">💧 습도</div><div class="sw-cell-val">${cur.humidity}%</div></div>
          <div class="sw-cell"><div class="sw-cell-label">💨 풍속</div><div class="sw-cell-val">${cur.wind}m/s</div></div>
          <div class="sw-cell"><div class="sw-cell-label">🌡️ 오늘 최고 체감</div><div class="sw-cell-val" style="color:${tempColor(fcst.feelsMax??0)}">${fcst.feelsMax??'-'}°C</div></div>
          <div class="sw-cell"><div class="sw-cell-label">🌡️ 오늘 최저 체감</div><div class="sw-cell-val" style="color:${tempColor(fcst.feelsMin??0)}">${fcst.feelsMin??'-'}°C</div></div>
        </div>
        <div style="font-size:11px;color:var(--hint);margin-top:8px;">
          ※ 기상청 격자 (nx:${coords.nx}, ny:${coords.ny}) 기준${isIndividual ? ' · 현장 개별 좌표 적용' : ' · 권역 대표 좌표 적용'}
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('modal-body').innerHTML = `
      <div class="site-weather visible">
        <button class="back-btn" onclick="openModal('${regionName}')">← ${regionName} 권역 목록</button>
        <div class="sw-error">⚠️ 날씨 정보를 불러오지 못했습니다.<br>${e.message}</div>
      </div>`;
  }
}
// ── 지도 관련 ─────────────────────────────────────────────────────────
const REGION_NAME_MAP = {
  '서울특별시':   '서울',
  '인천광역시':   '인천',
  '경기도':       '경기',
  '강원도':       '강원',
  '강원특별자치도': '강원',
  '충청북도':     '충북',
  '충청남도':     '충남',
  '대전광역시':   '충남',
  '세종특별자치시': '충남',
  '전라북도':     '전북',
  '전북특별자치도': '전북',
  '전라남도':     '전남',
  '광주광역시':   '전남',
  '경상북도':     '경북',
  '대구광역시':   '경북',
  '경상남도':     '경남',
  '부산광역시':   '경남',
  '울산광역시':   '경남',
  '제주특별자치도': '제주',
};

const ALERT_FILL = {
  critical: '#F09595',
  warning:  '#FFEAEA',
  watch:    '#FFF3CD',
  none:     '#E1F5EE',
};
const ALERT_STROKE = {
  critical: '#E24B4A',
  warning:  '#FFB3B3',
  watch:    '#FFEAA7',
  none:     '#9FE1CB',
};

let mapSvg = null;
const regionAlertState = {};

function initMap(geojson) {
  const W = 260, H = 420;
  const projection = d3.geoMercator().fitSize([W, H], geojson);
  const path = d3.geoPath().projection(projection);

  mapSvg = d3.select('#korea-map')
    .append('svg')
    .attr('width', W)
    .attr('height', H)
    .style('display', 'block');

  mapSvg.selectAll('path')
    .data(geojson.features)
    .enter()
    .append('path')
    .attr('d', path)
    .attr('fill', '#E1F5EE')
    .attr('stroke', '#fff')
    .attr('stroke-width', 1.2)
    .attr('cursor', 'pointer')
    .attr('class', d => {
      const rname = REGION_NAME_MAP[d.properties.name] || '';
      return 'map-region region-' + rname;
    })
    .on('click', (event, d) => {
      const rname = REGION_NAME_MAP[d.properties.name] || '';
      if (rname) openModal(rname);
    })
    .on('mouseover', function() {
      d3.select(this).attr('opacity', 0.75);
    })
    .on('mouseout', function() {
      d3.select(this).attr('opacity', 1);
    });
}

function updateMapAlert(regionName, alertType) {
  regionAlertState[regionName] = alertType;
  if (!mapSvg) return;
  mapSvg.selectAll('.region-' + regionName)
    .attr('fill',   ALERT_FILL[alertType]   || ALERT_FILL.none)
    .attr('stroke', ALERT_STROKE[alertType] || ALERT_STROKE.none);
}

// GeoJSON 로드 (GitHub Pages 경로)
fetch('./skorea_provinces_geo_simple.json')
  .then(r => r.json())
  .then(geojson => initMap(geojson))
  .catch(err => console.warn('지도 로드 실패:', err));
loadAll();
</script>
