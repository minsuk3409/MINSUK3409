// ── 유틸 ─────────────────────────────────────────────────────────────
function getApiBase() { return localStorage.getItem('vercel_api_url') || 'https://daewooenc-weather.vercel.app'; }
function saveApiUrl() {
  const val = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
  if (val) { localStorage.setItem('vercel_api_url', val); setBannerGreen(); loadAll(); }
}
function setBannerGreen() {
  const b = document.getElementById('api-banner');
  b.style.background='#EAF3DE'; b.style.borderColor='#639922'; b.style.color='#27500A';
}
window.addEventListener('load', () => {
  const saved = getApiBase();
  if (saved) { document.getElementById('api-url-input').value = saved; setBannerGreen(); }
});

function ptyIcon(pty) { return {'0':'☀️','1':'🌧️','2':'🌨️','3':'❄️','4':'🌦️','5':'🌧️','6':'🌨️','7':'❄️'}[pty]??'🌡️'; }
function ptyDesc(pty) { return {'0':'맑음','1':'비','2':'비/눈','3':'눈','4':'소나기','5':'빗방울','6':'빗방울+눈','7':'눈날림'}[pty]??'-'; }
function tempMeta(t) {
if (t >= 38) return { label: '옥외작업 중지', color: '#8B0000', bg: '#FDE8E8' };
if (t >= 35) return { label: '옥외작업 최소화', color: '#D94111', bg: '#FFF0EA' };
if (t >= 33) return { label: '시간당 15분 이상 휴식', color: '#C67A00', bg: '#FFF7E6' };
if (t >= 31) return { label: '시간당 15분 휴식', color: '#2B7318', bg: '#EAF5E6' };

if (t >= 28) return { label: '더움', color: '#3B6D11', bg: '#EAF3DE' };
if (t >= 25) return { label: '산뜻함', color: '#185FA5', bg: '#E6F1FB' };
if (t >= 10)  return { label: '선선함', color: '#534AB7', bg: '#EEEDFE' };
return { label: '매우 추움', color: '#0C447C', bg: '#B5D4F4' };
}
function tempColor(t) {
  if (t>=35) return '#A32D2D'; if (t>=28) return '#BA7517';
  if (t>=20) return '#3B6D11'; if (t>=10) return '#185FA5';
  if (t>=0)  return '#534AB7'; return '#0C447C';
}

async function fetchWeather(nx, ny) {
  const base = getApiBase();
  const [cur, fcst] = await Promise.all([
    fetch(`${base}/api/weather?nx=${nx}&ny=${ny}&type=current`).then(r=>r.json()),
    fetch(`${base}/api/weather?nx=${nx}&ny=${ny}&type=forecast`).then(r=>r.json()),
  ]);
  return { cur, fcst };
}

async function fetchAlert(regionName) {
  try {
    const base = getApiBase();
    const res = await fetch(`${base}/api/alert?region=${encodeURIComponent(regionName)}`);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}
function alertMapColor(a) {
  if (a === 'critical') return { fill:'#F09595', text:'#501313' };
  if (a === 'warning')  return { fill:'#FFEAEA', text:'#791F1F' };
  if (a === 'watch')    return { fill:'#FFF3CD', text:'#856404' };
  return { fill:'#E1F5EE', text:'#085041' };
}
function renderAlertBadge(alertData, regionName) {
  if (!alertData || alertData.type === 'none' || !alertData.type)
    return `<span class="alert-badge alert-none" id="alert-${regionName}"></span>`;
  if (alertData.type === 'critical')
    return `<span class="alert-badge alert-critical" id="alert-${regionName}">🚨 폭염중대경보 발효중</span>`;
  if (alertData.type === 'warning')
    return `<span class="alert-badge alert-warn" id="alert-${regionName}">🔴 폭염경보 발효중</span>`;
  if (alertData.type === 'watch')
    return `<span class="alert-badge alert-watch" id="alert-${regionName}">🟡 폭염주의보 발효중</span>`;
  return `<span class="alert-badge alert-none" id="alert-${regionName}"></span>`;
}

function renderCard(r, data) {
  const siteCount = (SITES[r.name]||[]).length;
  if (!data) return `
    <div class="card" onclick="openModal('${r.name}')" style="min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;opacity:.5;">
      <div class="region">${r.name}</div>
      <span style="font-size:13px;color:var(--muted)">API URL을 먼저 설정해주세요</span>
      <div class="site-count">현장 ${siteCount}개</div>
    </div>`;
  const {cur,fcst} = data;
  const feels = cur.feelsLike??cur.temp;
  const meta = tempMeta(feels);
  return `
    <div class="card" onclick="openModal('${r.name}')">
      <div class="card-top">
        <div><div class="region">${r.name}</div><div class="city">${r.city} 기준</div></div>
        <div class="weather-icon">${ptyIcon(cur.pty)}</div>
      </div>
      <div class="temp-now-label">현재 체감온도</div>
      <div class="temp-now" style="color:${meta.color}">${feels}°C</div>
      <div class="temp-actual">실제 기온 ${cur.temp}°C · ${ptyDesc(cur.pty)}</div>
      <div class="divider"></div>
      <div class="temp-range">
        <div class="range-item"><div class="range-label">오늘 최고 체감</div><div class="range-val" style="color:${tempColor(fcst.feelsMax??0)}">${fcst.feelsMax??'-'}°</div></div>
        <div class="range-item"><div class="range-label">오늘 최저 체감</div><div class="range-val" style="color:${tempColor(fcst.feelsMin??0)}">${fcst.feelsMin??'-'}°</div></div>
      </div>
      <div class="meta"><span>💧 ${cur.humidity}%</span><span>💨 ${cur.wind}m/s</span></div>
      <span class="badge" style="color:${meta.color};background:${meta.bg}">${meta.label}</span>
      <span class="alert-badge alert-loading" id="alert-${r.name}">특보 확인중…</span>
      <div class="site-count">현장 ${siteCount}개 ›</div>
    </div>`;
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  document.getElementById('grid').innerHTML = REGIONS.map(()=>`<div class="skeleton"></div>`).join('');
  document.getElementById('updated').textContent = '불러오는 중...';
  try {
    const results = await Promise.all(REGIONS.map(r => fetchWeather(r.nx, r.ny).catch(()=>null)));
    document.getElementById('grid').innerHTML = REGIONS.map((r,i)=>renderCard(r,results[i])).join('');
    const now = new Date();
    document.getElementById('updated').textContent =
      `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 기준`;
    REGIONS.forEach(async r => {
      const alertData = await fetchAlert(r.name).catch(()=>null);
      const el = document.getElementById(`alert-${r.name}`);
      if (el) { const tmp=document.createElement('div'); tmp.innerHTML=renderAlertBadge(alertData,r.name); el.replaceWith(tmp.firstElementChild); }
      const mapEl = document.getElementById('map-' + r.name);
      if (mapEl) {
      const c = alertMapColor(alertData?.type);
      mapEl.setAttribute('fill', c.fill);
      const allTexts = document.querySelectorAll('#korea-map text');
      allTexts.forEach(t => {
      if (t.textContent.trim() === r.name) t.setAttribute('fill', c.text);
    });
  }
});
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="error-box">⚠️ 데이터를 불러오지 못했습니다.<br>${e.message}</div>`;
  } finally { btn.disabled=false; }
}

// ── 모달 ─────────────────────────────────────────────────────────────
function openModal(regionName) {
  const sites = SITES[regionName]||[];
  document.getElementById('modal-title').textContent = `${regionName} 권역 · 현장 ${sites.length}개`;
  document.getElementById('modal-body').innerHTML = sites.length
    ? `<ul class="site-list">${sites.map((s,i)=>`
        <li class="site-item" onclick="showSiteWeather('${regionName}',${i})">
          <div class="site-name">${s.name}</div>
          <div class="site-addr">${s.addr}</div>
        </li>`).join('')}</ul>`
    : `<div style="padding:3rem;text-align:center;color:var(--muted);">현장 정보가 없습니다.</div>`;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target===document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow=''; }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModalDirect(); });

// ── 현장별 날씨 (개별 격자 좌표 사용) ───────────────────────────────

  const regionDef = REGIONS.find(r=>r.name===regionName);
