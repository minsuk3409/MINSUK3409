<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>권역별 체감온도</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f3; --surface: #fff; --border: rgba(0,0,0,0.1);
      --text: #1a1a18; --muted: #6b6b68; --hint: #9b9b97;
      --radius: 14px; --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#1a1a18; --surface:#252523; --border:rgba(255,255,255,0.1); --text:#f0efe8; --muted:#9b9b97; --hint:#6b6b68; }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem 4rem; }
    .container { max-width:980px; margin:0 auto; }
    header { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:1.75rem; }
    header h1 { font-size:22px; font-weight:600; }
    header p  { font-size:13px; color:var(--muted); margin-top:4px; }
    .btn { font-size:13px; padding:8px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; display:flex; align-items:center; gap:6px; transition:opacity .15s; }
    .btn:hover { opacity:.7; } .btn:disabled { opacity:.4; cursor:not-allowed; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(190px, 1fr)); gap:14px; }

    /* ── 카드 ── */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; transition:transform .15s, box-shadow .15s; cursor:pointer; position:relative; }
    .card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.08); }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .region { font-size:15px; font-weight:600; }
    .city   { font-size:12px; color:var(--muted); margin-top:2px; }
    .weather-icon { font-size:26px; }
    .divider { height:1px; background:var(--border); margin:12px 0; }
    .temp-now-label { font-size:11px; color:var(--hint); margin-bottom:3px; }
    .temp-now  { font-size:36px; font-weight:700; line-height:1; }
    .temp-actual { font-size:12px; color:var(--muted); margin-top:4px; }
    .temp-range { display:flex; gap:12px; margin-top:12px; }
    .range-item { flex:1; }
    .range-label { font-size:10px; color:var(--hint); margin-bottom:2px; }
    .range-val   { font-size:17px; font-weight:600; }
    .meta { display:flex; gap:10px; margin-top:12px; font-size:12px; color:var(--muted); }
    .badge { display:inline-block; font-size:11px; font-weight:500; padding:3px 10px; border-radius:20px; margin-top:12px; }
    .site-count { font-size:11px; color:var(--hint); margin-top:8px; }

    /* ── 폭염특보 배지 ── */
    .alert-badge {
      display:inline-flex; align-items:center; gap:4px;
      font-size:11px; font-weight:600; padding:3px 10px;
      border-radius:20px; margin-top:8px;
    }
    .alert-watch  { background:#FFF3CD; color:#856404; border:1px solid #FFEAA7; }
    .alert-warn   { background:#FFEAEA; color:#A32D2D; border:1px solid #FFB3B3; }
    .alert-none   { display:none; }
    .alert-loading { background:var(--border); color:var(--hint); border:none; }

    .skeleton { background:var(--border); border-radius:var(--radius); height:230px; animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .error-box { grid-column:1/-1; padding:3rem; text-align:center; color:var(--muted); font-size:15px; }
    footer { margin-top:2.5rem; text-align:center; font-size:12px; color:var(--hint); line-height:1.8; }
    footer a { color:var(--muted); }

    /* ── API 배너 ── */
    #api-banner { background:#FAEEDA; border:1px solid #EF9F27; border-radius:var(--radius-sm); padding:12px 16px; margin-bottom:1.5rem; font-size:13px; color:#633806; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    #api-banner input { flex:1; min-width:200px; font-size:13px; padding:6px 10px; border-radius:6px; border:1px solid #EF9F27; background:#fff; color:#1a1a18; }
    #api-banner button { white-space:nowrap; font-size:13px; padding:6px 14px; border-radius:6px; border:1px solid #BA7517; background:#BA7517; color:#fff; cursor:pointer; }

    /* ── 모달 ── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100;
      display:flex; align-items:center; justify-content:center; padding:1rem;
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .modal-overlay.open { opacity:1; pointer-events:auto; }
    .modal {
      background:var(--surface); border-radius:var(--radius); width:100%; max-width:560px;
      max-height:85vh; display:flex; flex-direction:column;
      transform:translateY(16px); transition:transform .2s;
      box-shadow:0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-header {
      padding:1.25rem 1.5rem 1rem; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .modal-header h2 { font-size:17px; font-weight:600; }
    .modal-close { background:none; border:none; font-size:20px; color:var(--muted); cursor:pointer; line-height:1; padding:4px; }
    .modal-close:hover { color:var(--text); }
    .modal-body { overflow-y:auto; flex:1; }

    /* ── 현장 목록 ── */
    .site-list { list-style:none; }
    .site-item {
      padding:14px 1.5rem; border-bottom:1px solid var(--border);
      cursor:pointer; transition:background .12s;
    }
    .site-item:last-child { border-bottom:none; }
    .site-item:hover { background:rgba(0,0,0,0.03); }
    @media (prefers-color-scheme:dark) { .site-item:hover { background:rgba(255,255,255,0.05); } }
    .site-name { font-size:14px; font-weight:500; }
    .site-addr { font-size:12px; color:var(--muted); margin-top:3px; }

    /* ── 현장 날씨 패널 ── */
    .site-weather {
      padding:1.5rem; display:none; flex-direction:column; gap:12px;
    }
    .site-weather.visible { display:flex; }
    .back-btn {
      display:inline-flex; align-items:center; gap:6px;
      font-size:13px; color:var(--muted); background:none; border:none;
      cursor:pointer; padding:0; margin-bottom:4px;
    }
    .back-btn:hover { color:var(--text); }
    .sw-name { font-size:18px; font-weight:700; }
    .sw-addr { font-size:12px; color:var(--muted); margin-top:2px; }
    .sw-big  { font-size:52px; font-weight:800; line-height:1; margin-top:12px; }
    .sw-sub  { font-size:13px; color:var(--muted); margin-top:6px; }
    .sw-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
    .sw-cell { background:var(--bg); border-radius:10px; padding:12px 14px; }
    .sw-cell-label { font-size:11px; color:var(--hint); margin-bottom:4px; }
    .sw-cell-val   { font-size:22px; font-weight:700; }
    .sw-loading { text-align:center; padding:2rem; color:var(--muted); font-size:14px; }
    .sw-error   { text-align:center; padding:2rem; color:#A32D2D; font-size:14px; }
  </style>
</head>

// ── 유틸 ──────────────────────────────────────────────────────────────
function getApiBase() {
  return localStorage.getItem('vercel_api_url') || 'https://daewooenc-weather.vercel.app';
}
function saveApiUrl() {
  const val = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
  if (val) {
    localStorage.setItem('vercel_api_url', val);
    setBannerGreen();
    loadAll();
  }
}
function setBannerGreen() {
  const b = document.getElementById('api-banner');
  b.style.background = '#EAF3DE'; b.style.borderColor = '#639922'; b.style.color = '#27500A';
}
window.addEventListener('load', () => {
  const saved = getApiBase();
  if (saved) { document.getElementById('api-url-input').value = saved; setBannerGreen(); }
});

// ── 날씨 표현 ─────────────────────────────────────────────────────────
function ptyIcon(pty) {
  return { '0':'☀️','1':'🌧️','2':'🌨️','3':'❄️','4':'🌦️','5':'🌧️','6':'🌨️','7':'❄️' }[pty] ?? '🌡️';
}
function ptyDesc(pty) {
  return { '0':'맑음','1':'비','2':'비/눈','3':'눈','4':'소나기','5':'빗방울','6':'빗방울+눈','7':'눈날림' }[pty] ?? '-';
}
function tempMeta(t) {
  if (t >= 35) return { label:'매우 더움', color:'#A32D2D', bg:'#FCEBEB' };
  if (t >= 28) return { label:'더움',      color:'#854F0B', bg:'#FAEEDA' };
  if (t >= 20) return { label:'따뜻함',    color:'#3B6D11', bg:'#EAF3DE' };
  if (t >= 10) return { label:'선선함',    color:'#185FA5', bg:'#E6F1FB' };
  if (t >= 0)  return { label:'쌀쌀함',    color:'#534AB7', bg:'#EEEDFE' };
  return               { label:'매우 추움', color:'#0C447C', bg:'#B5D4F4' };
}
function tempColor(t) {
  if (t >= 35) return '#A32D2D';
  if (t >= 28) return '#BA7517';
  if (t >= 20) return '#3B6D11';
  if (t >= 10) return '#185FA5';
  if (t >= 0)  return '#534AB7';
  return '#0C447C';
}

// ── 폭염특보 fetch ────────────────────────────────────────────────────
// Vercel API에 /api/alert?region=XX 엔드포인트 필요
// 없으면 graceful fallback
async function fetchAlert(regionName) {
  const base = getApiBase();
  if (!base) return null;
  try {
    const res = await fetch(`${base}/api/alert?region=${encodeURIComponent(regionName)}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data; // { type: 'watch'|'warning'|'none', text: '...' }
  } catch { return null; }
}

// ── 날씨 fetch ────────────────────────────────────────────────────────
async function fetchRegion(r) {
  const base = getApiBase();
  if (!base) return null;
  const [cur, fcst] = await Promise.all([
    fetch(`${base}/api/weather?nx=${r.nx}&ny=${r.ny}&type=current`).then(r => r.json()),
    fetch(`${base}/api/weather?nx=${r.nx}&ny=${r.ny}&type=forecast`).then(r => r.json()),
  ]);
  return { cur, fcst };
}

// ── 카드 렌더 ──────────────────────────────────────────────────────────
function renderCard(r, data, alertData) {
  const siteList = SITES[r.name] || [];
  const siteCount = siteList.length;

  if (!data) {
    return `<div class="card" onclick="openModal('${r.name}')" style="opacity:.5;min-height:210px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;">
      <span style="font-size:22px;">📍</span>
      <div class="region">${r.name}</div>
      <span style="font-size:13px;color:var(--muted)">API URL을 먼저 설정해주세요</span>
      <div class="site-count">현장 ${siteCount}개</div>
    </div>`;
  }

  const { cur, fcst } = data;
  const feels = cur.feelsLike ?? cur.temp;
  const meta  = tempMeta(feels);

  // 폭염특보 배지
  let alertHtml = `<span class="alert-badge alert-loading" id="alert-${r.name}">특보 확인중…</span>`;
  if (alertData !== undefined) {
    alertHtml = renderAlertBadge(alertData, r.name);
  }

  return `
    <div class="card" onclick="openModal('${r.name}')">
      <div class="card-top">
        <div>
          <div class="region">${r.name}</div>
          <div class="city">${r.city} 기준</div>
        </div>
        <div class="weather-icon">${ptyIcon(cur.pty)}</div>
      </div>
      <div class="temp-now-label">현재 체감온도</div>
      <div class="temp-now" style="color:${meta.color}">${feels}°C</div>
      <div class="temp-actual">실제 기온 ${cur.temp}°C · ${ptyDesc(cur.pty)}</div>
      <div class="divider"></div>
      <div class="temp-range">
        <div class="range-item">
          <div class="range-label">오늘 최고 체감</div>
          <div class="range-val" style="color:${tempColor(fcst.feelsMax ?? 0)}">${fcst.feelsMax ?? '-'}°</div>
        </div>
        <div class="range-item">
          <div class="range-label">오늘 최저 체감</div>
          <div class="range-val" style="color:${tempColor(fcst.feelsMin ?? 0)}">${fcst.feelsMin ?? '-'}°</div>
        </div>
      </div>
      <div class="meta">
        <span>💧 ${cur.humidity}%</span>
        <span>💨 ${cur.wind}m/s</span>
      </div>
      <span class="badge" style="color:${meta.color};background:${meta.bg}">${meta.label}</span>
      ${alertHtml}
      <div class="site-count">현장 ${siteCount}개 ›</div>
    </div>`;
}

function renderAlertBadge(alertData, regionName) {
  if (!alertData || alertData.type === 'none' || !alertData.type) {
    return `<span class="alert-badge alert-none" id="alert-${regionName}"></span>`;
  }
  if (alertData.type === 'warning') {
    return `<span class="alert-badge alert-warn" id="alert-${regionName}">🔴 폭염경보 발효중</span>`;
  }
  if (alertData.type === 'watch') {
    return `<span class="alert-badge alert-watch" id="alert-${regionName}">🟡 폭염주의보 발효중</span>`;
  }
  return `<span class="alert-badge alert-none" id="alert-${regionName}"></span>`;
}

// ── 전체 로드 ─────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  document.getElementById('grid').innerHTML = REGIONS.map(() => `<div class="skeleton"></div>`).join('');
  document.getElementById('updated').textContent = '불러오는 중...';
  try {
    const weatherResults = await Promise.all(REGIONS.map(r => fetchRegion(r).catch(() => null)));
    document.getElementById('grid').innerHTML =
      REGIONS.map((r, i) => renderCard(r, weatherResults[i], undefined)).join('');

    const now = new Date();
    document.getElementById('updated').textContent =
      `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 기준`;

    // 폭염특보 비동기 로드 (순차적으로 업데이트)
    REGIONS.forEach(async (r) => {
      const alertData = await fetchAlert(r.name).catch(() => null);
      const el = document.getElementById(`alert-${r.name}`);
      if (el) {
        const badge = renderAlertBadge(alertData, r.name);
        const tmp = document.createElement('div');
        tmp.innerHTML = badge;
        const newBadge = tmp.firstElementChild;
        if (newBadge) el.replaceWith(newBadge);
        else el.classList.add('alert-none');
      }
    });

  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="error-box">⚠️ 데이터를 불러오지 못했습니다.<br>${e.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

// ── 모달: 현장 목록 ───────────────────────────────────────────────────
let currentRegion = null;

function openModal(regionName) {
  currentRegion = regionName;
  const sites = SITES[regionName] || [];
  document.getElementById('modal-title').textContent = `${regionName} 권역 · 현장 ${sites.length}개`;
  document.getElementById('modal-body').innerHTML = renderSiteList(regionName, sites);
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderSiteList(regionName, sites) {
  if (!sites.length) return `<div style="padding:3rem;text-align:center;color:var(--muted);">현장 정보가 없습니다.</div>`;
  return `<ul class="site-list">${sites.map((s, i) =>
    `<li class="site-item" onclick="showSiteWeather('${regionName}', ${i})">
      <div class="site-name">${s.name}</div>
      <div class="site-addr">${s.addr}</div>
    </li>`
  ).join('')}</ul>`;
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

    document.getElementById('modal-body').innerHTML = `
      <div class="site-weather visible">
        <button class="back-btn" onclick="openModal('${regionName}')">← ${regionName} 권역 목록</button>
        <div class="sw-error">⚠️ 날씨 정보를 불러오지 못했습니다.<br>${e.message}</div>
      </div>`;
  }
}

loadAll();
</script>
