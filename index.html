<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>권역별 체감온도</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f3; --surface: #fff; --border: rgba(0,0,0,0.1);
      --text: #1a1a18; --muted: #6b6b68; --hint: #9b9b97;
      --radius: 14px; --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#1a1a18; --surface:#252523; --border:rgba(255,255,255,0.1); --text:#f0efe8; --muted:#9b9b97; --hint:#6b6b68; }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem 4rem; }
    .container { max-width:980px; margin:0 auto; }
    header { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:1.75rem; }
    header h1 { font-size:22px; font-weight:600; }
    header p  { font-size:13px; color:var(--muted); margin-top:4px; }
    .btn { font-size:13px; padding:8px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; display:flex; align-items:center; gap:6px; transition:opacity .15s; }
    .btn:hover { opacity:.7; } .btn:disabled { opacity:.4; cursor:not-allowed; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(190px, 1fr)); gap:14px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; transition:transform .15s; }
    .card:hover { transform:translateY(-2px); }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .region { font-size:15px; font-weight:600; }
    .city   { font-size:12px; color:var(--muted); margin-top:2px; }
    .weather-icon { font-size:26px; }
    .divider { height:1px; background:var(--border); margin:12px 0; }
    .temp-now-label { font-size:11px; color:var(--hint); margin-bottom:3px; }
    .temp-now  { font-size:36px; font-weight:700; line-height:1; }
    .temp-actual { font-size:12px; color:var(--muted); margin-top:4px; }
    .temp-range { display:flex; gap:12px; margin-top:12px; }
    .range-item { flex:1; }
    .range-label { font-size:10px; color:var(--hint); margin-bottom:2px; }
    .range-val   { font-size:17px; font-weight:600; }
    .meta { display:flex; gap:10px; margin-top:12px; font-size:12px; color:var(--muted); }
    .badge { display:inline-block; font-size:11px; font-weight:500; padding:3px 10px; border-radius:20px; margin-top:12px; }
    .skeleton { background:var(--border); border-radius:var(--radius); height:210px; animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .error-box { grid-column:1/-1; padding:3rem; text-align:center; color:var(--muted); font-size:15px; }
    footer { margin-top:2.5rem; text-align:center; font-size:12px; color:var(--hint); line-height:1.8; }
    footer a { color:var(--muted); }

    /* API URL 설정 배너 */
    #api-banner { background:#FAEEDA; border:1px solid #EF9F27; border-radius:var(--radius-sm); padding:12px 16px; margin-bottom:1.5rem; font-size:13px; color:#633806; display:flex; align-items:center; gap:10px; }
    #api-banner input { flex:1; font-size:13px; padding:6px 10px; border-radius:6px; border:1px solid #EF9F27; background:#fff; color:#1a1a18; }
    #api-banner button { white-space:nowrap; font-size:13px; padding:6px 14px; border-radius:6px; border:1px solid #BA7517; background:#BA7517; color:#fff; cursor:pointer; }
  </style>
</head>
<body>
<div class="container">

  <!-- Vercel URL 설정 배너 -->
  <div id="api-banner">
    ⚙️ Vercel API URL 입력:
    <input type="text" id="api-url-input" placeholder="https://your-project.vercel.app" value=""/>
    <button onclick="saveApiUrl()">저장</button>
  </div>

  <header>
    <div>
      <h1>🌡️ 권역별 체감온도</h1>
      <p id="updated">불러오는 중...</p>
    </div>
    <button class="btn" id="refreshBtn" onclick="loadAll()">↻ 새로고침</button>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    날씨 데이터: <a href="https://www.kma.go.kr" target="_blank">기상청 단기예보 API</a> ·
    API 프록시: <a href="https://vercel.com" target="_blank">Vercel 서버리스</a><br>
    체감온도 = 기온·풍속·습도 기반 계산 (기상청 공식 적용)<br>
    매 페이지 로드 시 실시간 갱신
  </footer>
</div>

<script>
// ── 권역 목록 (기상청 격자 nx/ny 좌표) ──────────────────────────────
const REGIONS = [
  { name:'서울',   city:'서울',   nx:60, ny:127 },
  { name:'경기',   city:'수원',   nx:60, ny:121 },
  { name:'충남',   city:'대전',   nx:67, ny:100 },
  { name:'충북',   city:'청주',   nx:69, ny:107 },
  { name:'전북',   city:'전주',   nx:63, ny:89  },
  { name:'전남',   city:'광주',   nx:58, ny:74  },
  { name:'강원',   city:'춘천',   nx:73, ny:134 },
  { name:'경북',   city:'대구',   nx:89, ny:90  },
  { name:'경남',   city:'부산',   nx:98, ny:76  },
  { name:'제주',   city:'제주',   nx:52, ny:38  },
];

// ── API URL (Vercel 배포 후 입력) ────────────────────────────────────
function getApiBase() {
  return localStorage.getItem('vercel_api_url') || 'https://daewooenc-weather.vercel.app';
}
function saveApiUrl() {
  const val = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
  if (val) {
    localStorage.setItem('vercel_api_url', val);
    document.getElementById('api-banner').style.background = '#EAF3DE';
    document.getElementById('api-banner').style.borderColor = '#639922';
    document.getElementById('api-banner').style.color = '#27500A';
    loadAll();
  }
}
window.addEventListener('load', () => {
  const saved = getApiBase();
  if (saved) {
    document.getElementById('api-url-input').value = saved;
    document.getElementById('api-banner').style.background = '#EAF3DE';
    document.getElementById('api-banner').style.borderColor = '#639922';
    document.getElementById('api-banner').style.color = '#27500A';
  }
});

// ── 날씨 상태 ────────────────────────────────────────────────────────
function ptyIcon(pty) {
  return { '0':'☀️','1':'🌧️','2':'🌨️','3':'❄️','4':'🌦️','5':'🌧️','6':'🌨️','7':'❄️' }[pty] ?? '🌡️';
}
function ptyDesc(pty) {
  return { '0':'맑음','1':'비','2':'비/눈','3':'눈','4':'소나기','5':'빗방울','6':'빗방울+눈','7':'눈날림' }[pty] ?? '-';
}
function tempMeta(t) {
  if (t >= 35) return { label:'매우 더움', color:'#A32D2D', bg:'#FCEBEB' };
  if (t >= 28) return { label:'더움',      color:'#854F0B', bg:'#FAEEDA' };
  if (t >= 20) return { label:'따뜻함',    color:'#3B6D11', bg:'#EAF3DE' };
  if (t >= 10) return { label:'선선함',    color:'#185FA5', bg:'#E6F1FB' };
  if (t >= 0)  return { label:'쌀쌀함',    color:'#534AB7', bg:'#EEEDFE' };
  return               { label:'매우 추움', color:'#0C447C', bg:'#B5D4F4' };
}
function tempColor(t) {
  if (t >= 35) return '#A32D2D';
  if (t >= 28) return '#BA7517';
  if (t >= 20) return '#3B6D11';
  if (t >= 10) return '#185FA5';
  if (t >= 0)  return '#534AB7';
  return '#0C447C';
}

// ── 데이터 fetch ─────────────────────────────────────────────────────
async function fetchRegion(r) {
  const base = getApiBase();
  if (!base) return null;
  const [cur, fcst] = await Promise.all([
    fetch(`${base}/api/weather?nx=${r.nx}&ny=${r.ny}&type=current`).then(r => r.json()),
    fetch(`${base}/api/weather?nx=${r.nx}&ny=${r.ny}&type=forecast`).then(r => r.json()),
  ]);
  return { cur, fcst };
}

// ── 카드 렌더 ────────────────────────────────────────────────────────
function renderCard(r, data) {
  if (!data) {
    return `<div class="card" style="opacity:.5;display:flex;align-items:center;justify-content:center;height:210px;">
      <span style="font-size:13px;color:var(--muted)">API URL을 먼저 설정해주세요</span></div>`;
  }
  const { cur, fcst } = data;
  const feels  = cur.feelsLike ?? cur.temp;
  const meta   = tempMeta(feels);
  return `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="region">${r.name}</div>
          <div class="city">${r.city} 기준</div>
        </div>
        <div class="weather-icon">${ptyIcon(cur.pty)}</div>
      </div>
      <div class="temp-now-label">현재 체감온도</div>
      <div class="temp-now" style="color:${meta.color}">${feels}°C</div>
      <div class="temp-actual">실제 기온 ${cur.temp}°C · ${ptyDesc(cur.pty)}</div>
      <div class="divider"></div>
      <div class="temp-range">
        <div class="range-item">
          <div class="range-label">오늘 최고 체감</div>
          <div class="range-val" style="color:${tempColor(fcst.feelsMax ?? 0)}">${fcst.feelsMax ?? '-'}°</div>
        </div>
        <div class="range-item">
          <div class="range-label">오늘 최저 체감</div>
          <div class="range-val" style="color:${tempColor(fcst.feelsMin ?? 0)}">${fcst.feelsMin ?? '-'}°</div>
        </div>
      </div>
      <div class="meta">
        <span>💧 ${cur.humidity}%</span>
        <span>💨 ${cur.wind}m/s</span>
      </div>
      <span class="badge" style="color:${meta.color};background:${meta.bg}">${meta.label}</span>
    </div>`;
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  document.getElementById('grid').innerHTML = REGIONS.map(() => `<div class="skeleton"></div>`).join('');
  document.getElementById('updated').textContent = '불러오는 중...';
  try {
    const results = await Promise.all(REGIONS.map(r => fetchRegion(r)));
    document.getElementById('grid').innerHTML = REGIONS.map((r, i) => renderCard(r, results[i])).join('');
    const now = new Date();
    document.getElementById('updated').textContent =
      `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 기준`;
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="error-box">⚠️ 데이터를 불러오지 못했습니다.<br>${e.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

loadAll();
</script>
</body>
</html>
